# SwiftLint config for Relay. Pragmatic, not pedantic — surfaces real quality issues without
# drowning the log in style noise. Run locally with `swiftlint`; CI runs it as a reporting gate.
included:
  - Relay
  - RelayTests
  - RelayUITests

disabled_rules:
  - todo                 # the stub adapters intentionally carry TODOs for the real network calls
  - trailing_comma
  # URLProtocol's canInit(with:)/canonicalRequest(for:) are declared `class func` on the Foundation
  # side, so overriding them (NetworkSimulator, a test-only URLProtocol stub) requires `override
  # class func` even inside a `final class` -- `static func` would not compile there. This rule
  # can't distinguish "could be static" from "must match a superclass class func", so it's off
  # rather than fighting a false positive on every URLProtocol subclass.
  - static_over_final_class

opt_in_rules:
  - empty_count
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - empty_string
  - first_where
  - last_where
  - redundant_nil_coalescing
  - toggle_bool
  - unused_import

line_length:
  warning: 140
  error: 220
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 70
  error: 120

type_body_length:
  warning: 320
  error: 500

file_length:
  warning: 500
  error: 800

identifier_name:
  min_length:
    warning: 2          # allow cx/cy/dx/id etc.
  # i/j: loop indices (DiscoveryResult's fixed-point merge pass). a/b/c: short device fixtures in
  # DiscoveryResultTests, where the point of the test is the merge relationship between them, not
  # what they're called.
  excluded: [id, cx, cy, dx, dy, r, x, y, d, i, j, a, b, c]

type_name:
  min_length: 3

cyclomatic_complexity:
  # RemoteCommand.requiredCapability and similar flat command/capability lookup switches
  # legitimately run ~16-18: one case-pattern per enum case, no actual branching complexity.
  # Splitting a lookup table across functions to satisfy a lower number would hurt readability,
  # not help it -- 20 catches genuine nested-conditional complexity without flagging these.
  warning: 20
