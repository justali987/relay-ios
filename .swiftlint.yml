# SwiftLint config for Relay. Pragmatic, not pedantic — surfaces real quality issues without
# drowning the log in style noise. Run locally with `swiftlint`; CI runs it as a reporting gate.
included:
  - Relay
  - RelayTests
  - RelayUITests

disabled_rules:
  - todo                 # the stub adapters intentionally carry TODOs for the real network calls
  - trailing_comma

opt_in_rules:
  - empty_count
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - empty_string
  - first_where
  - last_where
  - redundant_nil_coalescing
  - toggle_bool
  - unused_import

line_length:
  warning: 140
  error: 220
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 70
  error: 120

type_body_length:
  warning: 320
  error: 500

file_length:
  warning: 500
  error: 800

identifier_name:
  min_length:
    warning: 2          # allow cx/cy/dx/id etc.
  excluded: [id, cx, cy, dx, dy, r, x, y, d]

type_name:
  min_length: 3

cyclomatic_complexity:
  warning: 12
