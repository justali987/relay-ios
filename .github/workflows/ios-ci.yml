name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    # SwiftLint as a reporting gate. Fails only on error-level violations (see .swiftlint.yml);
    # warnings show in the log without blocking. Fast, so it runs on every push.
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --reporter github-actions-logging

  build-and-test:
    # Build + unit tests across a spread of iPhone screen sizes (smallest current SE, standard 16,
    # largest Pro Max) so layout / Dynamic Type regressions surface on more than one device. iOS
    # version is left unpinned (newest paired runtime per device) — pinning a minor version is
    # fragile across runner-image updates. No code signing: simulator builds never need it.
    runs-on: macos-15
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        device:
          - "iPhone SE (3rd generation)"
          - "iPhone 16"
          - "iPhone 16 Pro Max"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode/Swift versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project from project.yml
        run: xcodegen generate

      - name: Boot the matrix simulator and capture its UDID
        run: ./scripts/boot-simulator.sh
        env:
          SIM_DEVICE: ${{ matrix.device }}

      - name: Build (Relay app target)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Relay.xcodeproj \
            -scheme Relay \
            -destination "platform=iOS Simulator,id=$SIM_UDID" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests (RelayTests)
        run: |
          set -o pipefail
          xcodebuild test \
            -project Relay.xcodeproj \
            -scheme Relay \
            -only-testing:RelayTests \
            -destination "platform=iOS Simulator,id=$SIM_UDID" \
            CODE_SIGNING_ALLOWED=NO

  ui-tests:
    # Slower simulator UI automation — manually triggered so it doesn't run on every push. Runs on
    # the standard device only. Trigger from the Actions tab ("Run workflow").
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project from project.yml
        run: xcodegen generate

      - name: Boot an iPhone simulator and capture its UDID
        run: ./scripts/boot-simulator.sh
        env:
          SIM_DEVICE: "iPhone 16"

      - name: Run UI tests (RelayUITests)
        run: |
          set -o pipefail
          xcodebuild test \
            -project Relay.xcodeproj \
            -scheme Relay \
            -only-testing:RelayUITests \
            -destination "platform=iOS Simulator,id=$SIM_UDID" \
            CODE_SIGNING_ALLOWED=NO
