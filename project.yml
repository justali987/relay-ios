name: Relay
options:
  bundleIdPrefix: com.relay.app
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

targets:
  Relay:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Relay
    info:
      path: Generated/Relay-Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocalNetworkUsageDescription: "Relay finds and controls compatible devices on your home Wi-Fi. Nothing leaves your home."
        NSBonjourServices:
          - _androidtvremote2._tcp
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.relay.app.Relay
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        # No team/signing required — CI builds and tests only against the iOS Simulator, which
        # never needs a real Apple Developer certificate. See docs/07-implementation-plan.md.
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO

  RelayTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RelayTests
    dependencies:
      - target: Relay
    settings:
      base:
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO

  RelayUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RelayUITests
    dependencies:
      - target: Relay
    settings:
      base:
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO

schemes:
  Relay:
    build:
      targets:
        Relay: [run, test, analyze, archive]
        RelayTests: [test]
        RelayUITests: [test]
    test:
      # Both test targets are members of the scheme's test action so either can be selected with
      # `xcodebuild test -only-testing:<target>`. The CI workflow uses that flag to keep the two
      # kinds separate: the push job runs `-only-testing:RelayTests` (fast, deterministic), and the
      # manual workflow_dispatch job runs `-only-testing:RelayUITests` (slower simulator UI
      # automation). A target must be listed here to be `-only-testing`-selectable at all — leaving
      # RelayUITests out is what made the UI job fail with "isn't a member of ... the scheme".
      # (RelayUITests' own launch arguments, e.g. `-UITest_ResetState`, are set in code via
      # `XCUIApplication.launchArguments`.)
      targets:
        - RelayTests
        - RelayUITests
