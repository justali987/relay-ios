name: Relay
options:
  bundleIdPrefix: com.relay.app
  # Target hardware floor is iPhone 12 and later. iPhone 12 has no chip/capability Relay needs and
  # isn't excluded by anything here — the only thing that can exclude it is this OS floor, and
  # iPhone 12 fully supports iOS 17+ (Apple still ships it current updates). Going lower than 17
  # would only additionally reach iPhone 12 owners who haven't updated their OS in years, at the
  # cost of ripping out @Observable/@Bindable (iOS 17+), which AppState/AppSettings and every
  # Settings screen are built on — not worth it for that sliver of users. Revisit only if real
  # install data shows meaningful demand stuck below iOS 17.
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

packages:
  # Apple's X.509 + crypto libraries, used only by the Android TV adapter to mint the self-signed
  # client certificate its pairing protocol (androidtvremote2) requires. iOS ships no high-level API
  # to create an X.509 certificate, so these fill that gap. Both are first-party Apple SPM packages.
  SwiftCertificates:
    url: https://github.com/apple/swift-certificates.git
    from: 1.6.0
  SwiftCrypto:
    url: https://github.com/apple/swift-crypto.git
    from: 3.0.0

targets:
  Relay:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Relay
    info:
      path: Generated/Relay-Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Shown in the system Local Network permission prompt (triggered by SSDP discovery + any
        # Bonjour browse). Plain-language, per Apple TN3179 and App Review guidance — see
        # docs/08-launch-runbook.md.
        NSLocalNetworkUsageDescription: "Relay uses your local Wi-Fi to find and control compatible TVs in your home. Your commands stay on your network."
        # AndroidTVAdapter.discover() browses this service type via BonjourDiscoveryService to find
        # Android TV / Google TV devices advertising the androidtvremote2 pairing+control protocol.
        # Must be declared here or NWBrowser silently finds nothing on device (App Review also flags
        # an undeclared browsed service type) — see docs/07-implementation-plan.md milestone 8.
        NSBonjourServices:
          - "_androidtvremote2._tcp."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.relay.app.Relay
        SWIFT_VERSION: "6.0"
        # iPhone-only for the initial launch ("iphone only for now"). Change to "1,2" to re-enable
        # iPad — the layouts are already adaptive, so it's a one-line flip (plus iPad screenshots).
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        # Automatic signing; Codemagic manages the distribution cert/profile via the App Store
        # Connect API key at archive time (see codemagic.yaml). Signing is NOT forced off here so
        # the cloud-Mac archive can sign — the GitHub Actions simulator builds pass
        # CODE_SIGNING_ALLOWED=NO on the xcodebuild command line instead (see ios-ci.yml).
        CODE_SIGN_STYLE: Automatic
        # Required for `agvtool` (codemagic.yaml's build-number bump) to have anything to act on —
        # without this, agvtool silently fails to bump CFBundleVersion and every TestFlight upload
        # after the first is rejected as a duplicate build number.
        VERSIONING_SYSTEM: "apple-generic"
    dependencies:
      # Only the Android TV pairing handshake needs these — it mints a self-signed X.509 client
      # certificate itself (Roku/Tizen need no client cert at all).
      - package: SwiftCertificates
        product: X509
      - package: SwiftCrypto
        product: Crypto
      # RSA key generation. Deliberately a SEPARATE swift-crypto product, not part of `Crypto`:
      # CryptoKit (which `Crypto` maps to on Apple platforms) has no RSA support at all -- Apple
      # never added it, since RSA isn't part of CryptoKit's supported algorithm set. `_CryptoExtras`
      # is swift-crypto's own (non-CryptoKit-backed) implementation, needed because
      # androidtvremote2's pairing handshake authenticates using the client certificate's RSA
      # modulus/exponent (see AndroidTVClientIdentity) -- an EC key, used in the first attempt at
      # this adapter, has no modulus/exponent and cannot work here.
      - package: SwiftCrypto
        product: _CryptoExtras

  RelayTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RelayTests
    dependencies:
      - target: Relay
    settings:
      base:
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO

  RelayUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RelayUITests
    dependencies:
      - target: Relay
    settings:
      base:
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO

schemes:
  Relay:
    build:
      targets:
        Relay: [run, test, analyze, archive]
        RelayTests: [test]
        RelayUITests: [test]
    test:
      # Both test targets are members of the scheme's test action so either can be selected with
      # `xcodebuild test -only-testing:<target>`. The CI workflow uses that flag to keep the two
      # kinds separate: the push job runs `-only-testing:RelayTests` (fast, deterministic), and the
      # manual workflow_dispatch job runs `-only-testing:RelayUITests` (slower simulator UI
      # automation). A target must be listed here to be `-only-testing`-selectable at all — leaving
      # RelayUITests out is what made the UI job fail with "isn't a member of ... the scheme".
      # (RelayUITests' own launch arguments, e.g. `-UITest_ResetState`, are set in code via
      # `XCUIApplication.launchArguments`.)
      targets:
        - RelayTests
        - RelayUITests
